version: 2

project_name: arm

before:
  hooks:
    - go mod tidy

builds:
  - id: arm
    binary: arm
    main: ./cmd/armature
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids:
      - arm
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: "^feat(\\(.+\\))?!?:"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix(\\(.+\\))?!?:"
      order: 1
    - title: "Documentation"
      regexp: "^docs(\\(.+\\))?!?:"
      order: 2
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^chore(\\(.+\\))?!?:"
      - "^ci(\\(.+\\))?!?:"

release:
  github:
    owner: scullxbones
    name: armature
  draft: false
  prerelease: auto
