name: trls-coordinator
description: >
  Use when orchestrating work in a trellis-managed repository — finds unblocked
  tasks, assembles context, dispatches worker agents (sequentially or in parallel
  waves), integrates completed work, validates citation coverage, and closes
  stories with a pull request. Does not require a worker identity (skip
  worker-init). Requires trls on PATH (run make install).
compatibility: Designed for Claude Code and Gemini CLI. Requires trls on PATH.
